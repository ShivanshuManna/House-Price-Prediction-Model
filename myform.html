<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        .container {
            width: 380px;
            padding: 40px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            color: white;
            text-align: center;
        }

        .container h2 {
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            font-size: 14px;
            display: block;
            margin-bottom: 6px;
            opacity: 0.85;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            box-shadow: 0 0 0 2px rgba(255,255,255,0.6);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #1e3c72;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 25px 35px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease-in-out;
        }

        .modal-content h3 {
            margin-bottom: 10px;
            color: #1e3c72;
        }

        .close-btn {
            margin-top: 15px;
            padding: 8px 15px;
            border: none;
            background: #1e3c72;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🏡House Price Predictor</h2>

    <form action="/predict" method="post">
        <div class="input-group">
            <label>Area (sq ft)</label>
            <input type="number" name="area" required>
        </div>

        <div class="input-group">
            <label>Bedrooms</label>
            <input type="number" name="bedroom" required>
        </div>

        <div class="input-group">
            <label>House Age</label>
            <input type="number" name="age" required>
        </div>

        <button type="submit">Predict Price</button>
    </form>
</div>

<!-- Modal Popup -->
<div class="modal" id="resultModal">
    <div class="modal-content">
        <h3>Prediction Result</h3>
        <p>{{ Prediction_text }}</p>
        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
</div>

{% if Prediction_text %}
<script>
    document.getElementById("resultModal").style.display = "flex";
</script>
{% endif %}

<script>
    function closeModal() {
        document.getElementById("resultModal").style.display = "none";
    }
</script>

</body>
</html>
